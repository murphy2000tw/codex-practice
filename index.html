<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="./app-icon.png">
  <link rel="icon" type="image/png" href="./app-icon.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Marco and Vivi學習網</title>
  <link rel="stylesheet" href="style.css?v=1.8">

<body>
  <main class="page-shell home-shell">
    <section class="hero home-hero" aria-labelledby="page-title">
      <p class="eyebrow">Language Learning</p>
      <h1 id="page-title">Marco and Vivi學習網</h1>
      <p class="hero-text">選擇想練習的語言，一起慢慢累積學習力。</p>
    </section>

    <section class="entry-section home-entry-section" aria-labelledby="home-entry-title">
      <div class="category-header">
        <h2 id="home-entry-title">選擇學習入口</h2>
        <p class="category-count">日文與英文練習</p>
      </div>

      <div class="entry-grid home-entry-grid">
        <a class="word-card entry-card home-entry-card" href="japanese/">
          <span class="card-number">01</span>
          <h3 class="entry-card-title">日文學習</h3>
          <p class="entry-card-text">練習日文單字、文法與例句，適合 N5 / N4 基礎學習。</p>
          <span class="entry-card-action">進入日文學習</span>
        </a>

        <a class="word-card entry-card home-entry-card" href="english/">
          <span class="card-number">02</span>
          <h3 class="entry-card-title">英文學習</h3>
          <p class="entry-card-text">練習 GEPT 初級單字、冠詞、閱讀測驗與填空題。</p>
          <span class="entry-card-action">進入英文學習</span>
        </a>
      </div>
    </section>
