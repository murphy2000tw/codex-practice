<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="../app-icon.png">
  <link rel="icon" type="image/png" href="../app-icon.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>日文學習｜Marco and Vivi學習網</title>
  <link rel="stylesheet" href="../style.css?v=1.8">
</head>
<body>
  <main class="page-shell">
    <nav class="site-nav" aria-label="主選單">
      <a class="site-nav-link" href="../">首頁</a>
      <a class="site-nav-link is-active" href="./" aria-current="page">日文學習</a>
      <a class="site-nav-link" href="../english/">英文學習</a>
    </nav>
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">Japanese N5 Vocabulary</p>
      <h1 id="page-title">日文 N5 單字卡</h1>
      <p class="hero-text">每天練習基礎單字與文法，先看日文與假名，再按下按鈕確認中文意思、詞性或文法用法。</p>
    </section>

    <section class="japanese-tab-panel" aria-labelledby="japanese-tab-title">
      <div>
        <p class="filter-label" id="japanese-tab-title">日文學習</p>
      </div>
      <div class="japanese-tab-switch" role="tablist" aria-label="日文學習分類切換">
        <button id="japaneseVocabTab" class="japanese-tab-button is-active" type="button" role="tab" aria-selected="true" aria-controls="japaneseMainContent" data-japanese-tab="vocab">單字</button>
        <button id="japaneseGrammarTab" class="japanese-tab-button" type="button" role="tab" aria-selected="false" aria-controls="japaneseMainContent" data-japanese-tab="grammar">文法</button>
        <button id="japaneseReadingTab" class="japanese-tab-button" type="button" role="tab" aria-selected="false" aria-controls="japaneseReadingPanel" data-japanese-tab="reading">閱讀</button>
        <button id="japaneseListeningTab" class="japanese-tab-button" type="button" role="tab" aria-selected="false" aria-controls="japaneseListeningPanel" data-japanese-tab="listening">聽力</button>
      </div>
    </section>

    <div id="japaneseMainContent">
    <section class="category-panel" aria-labelledby="category-title">
      <div class="category-header">
        <h2 id="category-title">分類篩選</h2>
        <p id="categoryCount" class="category-count" aria-live="polite">正在載入分類資料…</p>
      </div>
      <div class="filter-group">
        <p id="categoryFilterLabel" class="filter-label">詞性分類</p>
        <div id="categoryFilters" class="category-filters" role="group" aria-label="選擇單字分類"></div>
      </div>
      <div class="filter-group">
        <p id="levelFilterLabel" class="filter-label">程度篩選</p>
        <div id="levelFilters" class="category-filters" role="group" aria-label="選擇單字程度"></div>
      </div>
      <div class="search-controls">
        <label id="searchLabel" class="search-label" for="wordSearch">搜尋單字</label>
        <div class="search-row">
          <input
            id="wordSearch"
            class="search-input"
            type="search"
            autocomplete="off"
            placeholder="搜尋日文、假名、中文、詞性、程度或例句"
          >
          <button id="clearSearch" class="secondary-button clear-search-button" type="button">清除搜尋</button>
        </div>
      </div>
    </section>

    <section class="mode-panel" aria-labelledby="mode-title">
      <div>
        <p class="filter-label" id="mode-title">模式切換</p>
        <p class="mode-description">選擇用單字卡複習、文法卡整理句型，或用選擇題測驗目前篩選出的單字與文法。</p>
      </div>
      <div class="mode-switch" role="group" aria-label="選擇練習模式">
        <button id="cardModeButton" class="mode-button is-active" data-mode-group="vocab" type="button" aria-pressed="true">單字練習</button>
        <button id="quizModeButton" class="mode-button" data-mode-group="vocab" type="button" aria-pressed="false">單字測驗</button>
        <button id="grammarModeButton" class="mode-button" data-mode-group="grammar" type="button" aria-pressed="false">文法練習</button>
        <button id="grammarQuizModeButton" class="mode-button" data-mode-group="grammar" type="button" aria-pressed="false">文法測驗</button>
      </div>
    </section>

    <section class="controls" aria-label="單字卡控制">
      <p id="wordSetStatus" class="set-status" aria-live="polite">正在載入單字資料…</p>
      <button id="shuffleWords" class="secondary-button" type="button">換一組單字</button>
      <button id="toggleAnswers" class="answer-button" type="button" aria-pressed="false">顯示答案</button>
    </section>

    <section class="quiz-panel" id="quizPanel" aria-live="polite" hidden>
      <div class="quiz-header">
        <div>
          <span class="card-number">測驗題目</span>
          <h2 class="quiz-title">請選出正確的中文意思</h2>
        </div>
        <div class="quiz-stats" aria-label="測驗分數統計">
          <span>已答題數：<strong id="quizAnsweredCount">0</strong></span>
          <span>答對題數：<strong id="quizCorrectCount">0</strong></span>
          <span>正確率：<strong id="quizAccuracy">0%</strong></span>
        </div>
      </div>
      <div id="grammarQuizTypeControls" class="quiz-type-controls" role="group" aria-label="選擇文法測驗題型" hidden>
        <button id="grammarMeaningQuizTypeButton" class="quiz-type-button is-active" type="button" aria-pressed="true">文法意思測驗</button>
        <button id="grammarClozeQuizTypeButton" class="quiz-type-button" type="button" aria-pressed="false">文法填空測驗</button>
      </div>
      <div id="quizContent" class="quiz-content"></div>
      <div class="quiz-actions">
        <button id="nextQuizQuestion" class="answer-button" type="button" hidden>下一題</button>
        <button id="restartQuiz" class="secondary-button" type="button">重新開始測驗</button>
      </div>
    </section>

    <section class="cards-grid" id="vocabularyCards" aria-live="polite"></section>
    </div>

    <section id="japaneseReadingPanel" class="japanese-placeholder-panel" role="tabpanel" aria-labelledby="japaneseReadingTab" hidden>
      <p>閱讀練習與測驗準備中</p>
    </section>

    <section id="japaneseListeningPanel" class="japanese-placeholder-panel" role="tabpanel" aria-labelledby="japaneseListeningTab" hidden>
      <p>聽力練習與測驗準備中</p>
    </section>
  </main>

  <script>
    window.JAPANESE_VOCABULARY_URL = "../vocabulary.json";
    window.JAPANESE_GRAMMAR_URL = "../grammar.json";
  </script>
  <script src="../script.js?v=1.8"></script>
</body>
</html>
