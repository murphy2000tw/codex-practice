<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="../app-icon.png">
  <link rel="icon" type="image/png" href="../app-icon.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>日文學習｜Marco and Vivi學習網</title>
  <meta name="japanese-layout-version" content="2.3">
  <link rel="stylesheet" href="../style.css?v=2.3">
</head>
<body data-japanese-layout-version="2.3">
  <main class="page-shell">
    <nav class="site-nav" aria-label="主選單">
      <a class="site-nav-link" href="../">首頁</a>
      <a class="site-nav-link is-active" href="./" aria-current="page">日文學習</a>
      <a class="site-nav-link" href="../english/">英文學習</a>
    </nav>
    <section id="japaneseContent" class="japanese-content" aria-live="polite">
    <div id="japaneseHomeContent">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">Japanese Learning</p>
      <h1 id="page-title">日文學習主入口</h1>
      <p class="hero-text">從單字、閱讀與文法三大主線進入日文學習；請先進入各中頁，再選擇練習或測驗。</p>
    </section>

    <section class="entry-section japanese-main-entry-section" aria-labelledby="japanese-main-entry-title">
      <div class="category-header">
        <h2 id="japanese-main-entry-title">日文學習功能</h2>
        <p class="category-count">主入口整理：單字、閱讀、文法</p>
      </div>
      <div class="entry-grid japanese-main-entry-grid">
        <button class="word-card entry-card japanese-main-entry-card" type="button" data-japanese-entry="vocabulary" aria-pressed="false">
          <span class="card-number">01</span>
          <h3 class="entry-card-title">單字</h3>
          <p class="entry-card-text">先進入單字選單，再選擇單字練習或單字測驗。</p>
          <span class="entry-card-action">進入單字</span>
        </button>
        <button class="word-card entry-card japanese-main-entry-card" type="button" data-japanese-entry="reading" aria-pressed="false">
          <span class="card-number">02</span>
          <h3 class="entry-card-title">閱讀</h3>
          <p class="entry-card-text">先進入閱讀選單，再選擇閱讀練習或閱讀測驗。</p>
          <span class="entry-card-action">進入閱讀</span>
        </button>
        <button class="word-card entry-card japanese-main-entry-card is-foundation" type="button" data-japanese-entry="grammar" aria-pressed="false">
          <span class="card-number">03</span>
          <h3 class="entry-card-title">文法</h3>
          <p class="entry-card-text">先進入文法選單，再選擇文法練習或文法測驗。</p>
          <span class="entry-card-action">進入文法</span>
        </button>
      </div>
    </section>

    </div>

    <div id="japaneseMainContent" hidden>
    <section class="feature-page-header" aria-labelledby="vocabulary-page-title">
      <div>
        <p id="japanese-feature-eyebrow" class="eyebrow">Japanese Vocabulary</p>
        <h2 id="vocabulary-page-title">日文單字</h2>
        <p id="japanese-feature-description" class="feature-page-description">選擇要進行單字練習或單字測驗。</p>
      </div>
      <button class="secondary-button" type="button" data-japanese-back-home>返回日文首頁</button>
    </section>

    <section id="japaneseVocabularyMenuView" class="vocabulary-menu-view" data-japanese-vocabulary-view="menu" aria-labelledby="vocabulary-menu-title">
      <div class="entry-grid vocabulary-menu-grid">
        <button class="word-card entry-card japanese-main-entry-card vocabulary-menu-card" type="button" data-japanese-vocabulary-entry="practice">
          <span class="card-number">01</span>
          <h3 id="vocabulary-menu-title" class="entry-card-title">單字練習</h3>
          <p class="entry-card-text">可瀏覽單字、搜尋、分類、複習例句。</p>
          <span class="entry-card-action">開始單字練習</span>
        </button>
        <button class="word-card entry-card japanese-main-entry-card vocabulary-menu-card" type="button" data-japanese-vocabulary-entry="quiz">
          <span class="card-number">02</span>
          <h3 class="entry-card-title">單字測驗</h3>
          <p class="entry-card-text">開始單字測驗，檢查記憶狀況。</p>
          <span class="entry-card-action">開始單字測驗</span>
        </button>
      </div>
    </section>

    <section id="japaneseGrammarMenuView" class="reading-menu-view" data-japanese-grammar-view="menu" aria-labelledby="grammar-menu-title" hidden>
      <div class="entry-grid reading-menu-grid">
        <button class="word-card entry-card japanese-main-entry-card reading-menu-card" type="button" data-japanese-grammar-entry="practice">
          <span class="card-number">01</span>
          <h3 id="grammar-menu-title" class="entry-card-title">文法練習</h3>
          <p class="entry-card-text">可查看文法說明、例句與解析，逐步熟悉用法。</p>
          <span class="entry-card-action">開始文法練習</span>
        </button>
        <button class="word-card entry-card japanese-main-entry-card reading-menu-card" type="button" data-japanese-grammar-entry="quiz">
          <span class="card-number">02</span>
          <h3 class="entry-card-title">文法測驗</h3>
          <p class="entry-card-text">專注作答並在完成後檢查測驗回饋。</p>
          <span class="entry-card-action">開始文法測驗</span>
        </button>
      </div>
    </section>
    <div id="japaneseVocabularyStudyView" data-japanese-vocabulary-view="practice" hidden>
      <button id="backToVocabularyMenuFromPractice" class="secondary-button vocabulary-back-menu-button" type="button">返回單字選單</button>

    <section class="category-panel" aria-labelledby="category-title">
      <div class="category-header">
        <h2 id="category-title">分類篩選</h2>
        <p id="categoryCount" class="category-count" aria-live="polite">正在載入分類資料…</p>
      </div>
      <div class="filter-group">
        <p id="categoryFilterLabel" class="filter-label">詞性分類</p>
        <div id="categoryFilters" class="category-filters" role="group" aria-label="選擇單字分類"></div>
      </div>
      <div class="filter-group">
        <p id="levelFilterLabel" class="filter-label">程度篩選</p>
        <div id="levelFilters" class="category-filters" role="group" aria-label="選擇單字程度"></div>
      </div>
      <div class="search-controls">
        <label id="searchLabel" class="search-label" for="wordSearch">搜尋單字</label>
        <div class="search-row">
          <input
            id="wordSearch"
            class="search-input"
            type="search"
            autocomplete="off"
            placeholder="搜尋日文、假名、中文、詞性、程度或例句"
          >
          <button id="clearSearch" class="secondary-button clear-search-button" type="button">清除搜尋</button>
        </div>
      </div>
    </section>


    <section class="controls" aria-label="單字卡控制">
      <p id="wordSetStatus" class="set-status" aria-live="polite">正在載入單字資料…</p>
      <button id="shuffleWords" class="secondary-button" type="button">換一組單字</button>
      <button id="toggleAnswers" class="answer-button" type="button" aria-pressed="false">顯示答案</button>
    </section>

    <section class="cards-grid" id="vocabularyCards" aria-live="polite"></section>
    </div>

    <section class="quiz-panel" id="quizPanel" data-japanese-vocabulary-view="quiz" aria-live="polite" hidden>
      <div class="quiz-header">
        <div>
          <span class="card-number">測驗題目</span>
          <h2 class="quiz-title">請選出正確的中文意思</h2>
        </div>
        <button id="backToVocabularyStudy" class="secondary-button" type="button">返回單字選單</button>
        <div class="quiz-stats" aria-label="測驗分數統計">
          <span>已答題數：<strong id="quizAnsweredCount">0</strong></span>
          <span>答對題數：<strong id="quizCorrectCount">0</strong></span>
          <span>正確率：<strong id="quizAccuracy">0%</strong></span>
        </div>
      </div>
      <div id="grammarQuizTypeControls" class="quiz-type-controls" role="group" aria-label="選擇文法測驗題型" hidden>
        <button id="grammarMeaningQuizTypeButton" class="quiz-type-button is-active" type="button" aria-pressed="true">文法意思測驗</button>
        <button id="grammarClozeQuizTypeButton" class="quiz-type-button" type="button" aria-pressed="false">文法填空測驗</button>
      </div>
      <div id="quizContent" class="quiz-content"></div>
      <div class="quiz-actions">
        <button id="nextQuizQuestion" class="answer-button" type="button" hidden>下一題</button>
        <button id="restartQuiz" class="secondary-button" type="button">重新開始測驗</button>
      </div>
    </section>
    </div>

    <section id="japaneseReadingPanel" class="reading-panel" role="tabpanel" aria-labelledby="reading-page-title" hidden>
      <div class="feature-page-header" aria-labelledby="reading-page-title">
        <div>
          <p class="eyebrow">Japanese Reading</p>
          <h2 id="reading-page-title">日文閱讀</h2>
          <p class="feature-page-description">閱讀練習保留 ruby 輔助；閱讀測驗模式維持不顯示 ruby。</p>
        </div>
        <button class="secondary-button" type="button" data-japanese-back-home>返回日文首頁</button>
      </div>
      <section id="japaneseReadingMenuView" class="reading-menu-view" data-japanese-reading-view="menu" aria-labelledby="reading-menu-title">
        <div class="entry-grid reading-menu-grid">
          <button class="word-card entry-card japanese-main-entry-card reading-menu-card" type="button" data-reading-mode="practice">
            <span class="card-number">01</span>
            <h3 id="reading-menu-title" class="entry-card-title">閱讀練習</h3>
            <p class="entry-card-text">可閱讀文章，搭配 ruby / 假名輔助進行練習。</p>
            <span class="entry-card-action">開始閱讀練習</span>
          </button>
          <button class="word-card entry-card japanese-main-entry-card reading-menu-card" type="button" data-reading-mode="quiz">
            <span class="card-number">02</span>
            <h3 class="entry-card-title">閱讀測驗</h3>
            <p class="entry-card-text">不顯示 ruby / 假名，進行閱讀理解測驗。</p>
            <span class="entry-card-action">開始閱讀測驗</span>
          </button>
        </div>
      </section>
      <div id="readingContent" class="reading-content" data-japanese-reading-view="content" aria-live="polite" hidden></div>
    </section>

    <section id="japaneseListeningPanel" class="japanese-placeholder-panel" role="tabpanel" aria-labelledby="japaneseListeningTab" hidden>
      <p>聽力練習與測驗準備中</p>
    </section>
    </section>
  </main>

  <script>
    window.JAPANESE_VOCABULARY_URL = "../vocabulary.json";
    window.JAPANESE_GRAMMAR_URL = "../grammar.json";
  </script>
  <script src="../japaneseReadingQuestions.js?v=1.0"></script>
  <script src="../script.js?v=2.3"></script>
</body>
</html>
