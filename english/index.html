<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="../app-icon.png">
  <link rel="icon" type="image/png" href="../app-icon.png">
  <link rel="manifest" href="../manifest.webmanifest">
  <title>英文學習｜GEPT 初級學習專區</title>
  <link rel="stylesheet" href="../style.css?v=1.8">
</head>
<body>
  <main class="page-shell">
    <nav class="site-nav" aria-label="主選單">
      <a class="site-nav-link" href="../">首頁</a>
      <a class="site-nav-link" href="../japanese/">日文學習</a>
      <a class="site-nav-link is-active" href="./" aria-current="page">英文學習</a>
    </nav>

    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">English Learning</p>
      <h1 id="page-title">英文學習</h1>
      <p class="hero-text">GEPT 初級學習專區</p>
    </section>

    <section class="entry-section" aria-labelledby="english-entry-title">
      <div class="category-header">
        <h2 id="english-entry-title">選擇練習內容</h2>
        <p class="category-count">五個 GEPT 初級練習入口</p>
      </div>

      <div class="entry-grid">
        <a class="word-card entry-card" href="vocabulary/">
          <span class="card-number">01</span>
          <h3 class="entry-card-title">GEPT 初級單字</h3>
          <p class="entry-card-text">每日單字、中文意思、詞性與例句練習。</p>
          <span class="entry-card-action">開始學習</span>
        </a>

        <a class="word-card entry-card" href="articles/">
          <span class="card-number">02</span>
          <h3 class="entry-card-title">冠詞練習</h3>
          <p class="entry-card-text">練習 a、an、the 的基本用法。</p>
          <span class="entry-card-action">開始練習</span>
        </a>

        <a class="word-card entry-card" href="reading/">
          <span class="card-number">03</span>
          <h3 class="entry-card-title">閱讀測驗</h3>
          <p class="entry-card-text">短篇英文文章閱讀與理解題。</p>
          <span class="entry-card-action">查看題型</span>
        </a>

        <a class="word-card entry-card" href="fill-in-the-blank/">
          <span class="card-number">04</span>
          <h3 class="entry-card-title">填空題</h3>
          <p class="entry-card-text">用單字、文法完成句子填空。</p>
          <span class="entry-card-action">查看題型</span>
        </a>

        <a class="word-card entry-card" href="listening/">
          <span class="card-number">05</span>
          <h3 class="entry-card-title">英文聽力</h3>
          <p class="entry-card-text">單字與句子聽力練習和測驗，使用瀏覽器語音播放英文。</p>
          <span class="entry-card-action">開始聽力</span>
        </a>
      </div>
      <div class="quiz-actions" style="margin-top: 1rem;">
        <button id="resetEnglishQuizProgress" class="secondary-button" type="button">重設英文測驗紀錄</button>
      </div>
    </section>
  </main>
  <script src="englishQuizProgress.js?v=1.1"></script>
  <script>document.querySelector("#resetEnglishQuizProgress")?.addEventListener("click", resetEnglishQuizProgressWithConfirm);</script>
</body>
</html>
