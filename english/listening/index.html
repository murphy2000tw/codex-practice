<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="../../app-icon.png">
  <link rel="icon" type="image/png" href="../../app-icon.png">
  <link rel="manifest" href="../../manifest.webmanifest">
  <title>聽力練習｜英文學習</title>
  <link rel="stylesheet" href="../../style.css?v=2.3">
</head>
<body>
  <main class="page-shell">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">English Listening</p>
      <h1 id="page-title">聽力練習</h1>
      <p class="hero-text">選擇聽力練習或測驗模式。</p>
    </section>

    <section class="entry-section" aria-labelledby="listening-entry-title">
      <div class="category-header">
        <h2 id="listening-entry-title">選擇聽力功能</h2>
        <p class="category-count">五個聽力入口</p>
      </div>

      <div class="entry-grid">
        <a class="word-card entry-card" href="practice.html?type=vocabulary">
          <span class="card-number">01</span>
          <h3 class="entry-card-title">單字聽力練習</h3>
          <p class="entry-card-text">聽英文單字發音，練習聽懂單字。</p>
          <span class="entry-card-action">開始練習</span>
        </a>

        <a class="word-card entry-card" href="practice.html?type=sentence">
          <span class="card-number">02</span>
          <h3 class="entry-card-title">句子聽力練習</h3>
          <p class="entry-card-text">聽英文句子，練習理解句意。</p>
          <span class="entry-card-action">開始練習</span>
        </a>

        <a class="word-card entry-card" href="practice.html?type=qa">
          <span class="card-number">03</span>
          <h3 class="entry-card-title">問答聽力練習</h3>
          <p class="entry-card-text">聽問題與回答，練習生活情境聽力。</p>
          <span class="entry-card-action">開始練習</span>
        </a>

        <a class="word-card entry-card" href="practice.html?type=geptPicture">
          <span class="card-number">04</span>
          <h3 class="entry-card-title">GEPT 聽力練習</h3>
          <p class="entry-card-text">練習 GEPT 初級常見聽力題型。</p>
          <span class="entry-card-action">開始練習</span>
        </a>

        <a class="word-card entry-card" href="quiz.html?type=geptFullMock">
          <span class="card-number">05</span>
          <h3 class="entry-card-title">聽力測驗 / GEPT 聽力模擬</h3>
          <p class="entry-card-text">用測驗確認聽力理解能力。</p>
          <span class="entry-card-action">開始測驗</span>
        </a>
      </div>

      <a class="secondary-button back-link" href="../">返回英文首頁</a>
    </section>
  </main>
</body>
</html>
