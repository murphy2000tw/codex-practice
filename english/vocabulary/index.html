<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEPT 初級單字｜英文學習</title>
  <link rel="stylesheet" href="../../style.css?v=1.8">
</head>
<body>
  <main class="page-shell">
    <nav class="site-nav" aria-label="主選單">
      <a class="site-nav-link" href="../../">日文學習</a>
      <a class="site-nav-link is-active" href="../" aria-current="page">英文學習</a>
    </nav>

    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">English Learning</p>
      <h1 id="page-title">GEPT 初級單字</h1>
      <p class="hero-text">每日單字、中文意思、詞性與例句練習。</p>
    </section>

    <section class="category-panel subpage-panel" aria-labelledby="subpage-title">
      <div class="category-header">
        <h2 id="subpage-title">單字卡學習</h2>
        <p id="currentProgress" class="category-count" aria-live="polite">1 / 30</p>
      </div>
      <p class="subpage-text">使用上一個／下一個按鈕依序練習 GEPT 初級常見單字，先熟悉單字、詞性與例句，再確認中文意思與翻譯。</p>

      <article id="vocabularyCard" class="word-card gept-vocabulary-card" aria-live="polite"></article>

      <div class="gept-vocabulary-controls" aria-label="GEPT 初級單字控制">
        <button id="previousWord" class="secondary-button" type="button">上一個單字</button>
        <button id="toggleChinese" class="secondary-button" type="button" aria-pressed="false">顯示中文</button>
        <button id="nextWord" class="answer-button" type="button">下一個單字</button>
      </div>

      <a class="secondary-button back-link" href="../">返回英文學習</a>
    </section>
  </main>

  <script src="geptVocabulary.js?v=1.0"></script>
  <script src="geptVocabularyPage.js?v=1.0"></script>
</body>
</html>
